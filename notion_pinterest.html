<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: transparent; }
  body { display: flex; justify-content: center; align-items: center; padding: 12px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .card { position: relative; width: 320px; border-radius: 18px; overflow: hidden; border: 0.5px solid rgba(255,255,255,0.2); }
  .bg { position: absolute; inset: 0; background-image: url('https://i.pinimg.com/originals/49/b3/d9/49b3d906ce8d3972091b2dfc8a45221c.gif'); background-size: cover; background-position: center; }
  .overlay { position: absolute; inset: 0; background: rgba(0,20,40,0.38); }
  .content { position: relative; z-index: 2; padding: 1.5rem; color: #fff; }
  .day { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.65; margin-bottom: 2px; }
  .date { font-size: 28px; font-weight: 500; line-height: 1.15; }
  .year { font-size: 12px; opacity: 0.55; margin-top: 2px; }
  .rule { height: 0.5px; background: rgba(255,255,255,0.18); margin: 1rem 0; }
  .time-row { display: flex; align-items: flex-end; gap: 10px; }
  .time { font-size: 50px; font-weight: 500; line-height: 1; letter-spacing: -2px; font-variant-numeric: tabular-nums; }
  .side { display: flex; flex-direction: column; gap: 4px; padding-bottom: 5px; }
  .ampm { font-size: 12px; opacity: 0.7; font-weight: 500; }
  .secs { font-size: 11px; opacity: 0.55; font-variant-numeric: tabular-nums; }
  .foot { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
  .tz { font-size: 10px; opacity: 0.55; display: flex; align-items: center; gap: 4px; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: #9FE1CB; }
  .week { font-size: 10px; background: rgba(255,255,255,0.12); border: 0.5px solid rgba(255,255,255,0.18); border-radius: 100px; padding: 2px 9px; opacity: 0.8; }
  .bar { height: 2px; background: rgba(255,255,255,0.12); border-radius: 2px; margin-top: 1rem; overflow: hidden; }
  .fill { height: 100%; background: #9FE1CB; border-radius: 2px; transition: width 1s linear; }
</style>
</head>
<body>
<div class="card">
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="day" id="d"></div>
    <div class="date" id="dt"></div>
    <div class="year" id="yr"></div>
    <div class="rule"></div>
    <div class="time-row">
      <div class="time" id="tm"></div>
      <div class="side">
        <div class="ampm" id="ap"></div>
        <div class="secs" id="sc"></div>
      </div>
    </div>
    <div class="bar"><div class="fill" id="pr" style="width:0%"></div></div>
    <div class="foot">
      <div class="tz"><div class="dot"></div><span id="tz"></span></div>
      <div class="week" id="wk"></div>
    </div>
  </div>
</div>
<script>
const D=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const M=['January','February','March','April','May','June','July','August','September','October','November','December'];
function p(n){return String(n).padStart(2,'0');}
function wn(d){const u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dw=u.getUTCDay()||7;u.setUTCDate(u.getUTCDate()+4-dw);const y=new Date(Date.UTC(u.getUTCFullYear(),0,1));return Math.ceil((((u-y)/864e5)+1)/7);}
function tick(){
  const n=new Date(),h=n.getHours(),m=n.getMinutes(),s=n.getSeconds(),h12=h%12||12;
  document.getElementById('d').textContent=D[n.getDay()];
  document.getElementById('dt').textContent=M[n.getMonth()]+' '+n.getDate();
  document.getElementById('yr').textContent=n.getFullYear();
  document.getElementById('tm').textContent=p(h12)+':'+p(m);
  document.getElementById('ap').textContent=h<12?'AM':'PM';
  document.getElementById('sc').textContent=p(s)+'s';
  document.getElementById('wk').textContent='Week '+wn(n);
  document.getElementById('pr').style.width=((h*3600+m*60+s)/864).toFixed(2)+'%';
  try{document.getElementById('tz').textContent=Intl.DateTimeFormat().resolvedOptions().timeZone.replace(/_/g,' ');}catch(e){}
}
tick(); setInterval(tick,1000);
</script>
</body>
</html>
